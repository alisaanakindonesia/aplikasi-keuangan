<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aplikasi Keuangan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:0;
}

.container{
background:white;
padding:20px;
width:100vw;
min-height:100vh;
margin:0;
border-radius:0;
}

@media (min-width:900px){

body{
padding:20px;
}

.container{
max-width:900px;
margin:auto;
border-radius:15px;
min-height:auto;
}

}

input,select{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#4a90e2;
color:white;
cursor:pointer;
margin-right:5px;
margin-top:5px;
}

.summary{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:120px;
padding:15px;
border-radius:10px;
}

.card h3{
margin:5px 0;
}

.pengeluaranCard{background:#ffe5e5;}
.pemasukanCard{background:#e5f0ff;}
.saldoCard{background:#e8ffe5;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:14px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

.amount{
color:#e53935;
font-weight:bold;
}

.pemasukan{
color:#1976d2;
font-weight:bold;
}

canvas{
margin-top:20px;
max-width:100%;
}

</style>
</head>

<body>

<div class="container">

<h2>Aplikasi Keuangan</h2>

<div class="summary">

<div class="card pengeluaranCard">
Total Pengeluaran
<h3 id="totalPengeluaran">Rp 0</h3>
</div>

<div class="card pemasukanCard">
Total Pemasukan
<h3 id="totalPemasukan">Rp 0</h3>
</div>

<div class="card saldoCard">
Saldo
<h3 id="saldo">Rp 0</h3>
</div>

</div>

<h3>Grafik Pengeluaran</h3>

<canvas id="chartPengeluaran"></canvas>

<label>Tipe</label>

<select id="tipe">
<option>Pengeluaran</option>
<option>Pemasukan</option>
</select>

<label>Kategori</label>

<select id="kategori"></select>

<label>Sub Kategori</label>

<select id="sub"></select>

<label>Tanggal</label>

<input type="date" id="tanggal">

<label>Jumlah</label>

<input type="number" id="jumlah">

<label>Catatan</label>

<input type="text" id="catatan">

<button onclick="simpan()">Simpan</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="backup()">Backup Data</button>

<hr>

<h3>Tambah Sub Kategori</h3>

<select id="kategoriBaru">
<option value="Tagihan">Tagihan</option>
<option value="Belanja">Belanja</option>
<option value="Makan">Makan</option>
<option value="Transport">Transport</option>
<option value="Lainnya">Lainnya</option>
<option value="Pemasukan">Pemasukan</option>
</select>

<input type="text" id="subBaru" placeholder="Nama sub kategori">

<button onclick="tambahSub()">Tambah Sub</button>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Tipe</th>
<th>Kategori</th>
<th>Sub</th>
<th>Jumlah</th>
<th>Catatan</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<script>

let kategori={

Pengeluaran:{
Tagihan:[
"Bayar Listrik",
"Beli Token Listrik",
"Bayar Internet",
"Bayar BPJS",
"Bayar Pulsa"
],

Belanja:[
"Belanja Supermarket",
"Belanja di Mall"
],

Makan:[
"Gojek / GoFood",
"Makan di Luar",
"Bekel Anak"
],

Transport:[
"Bensin Kendaraan"
],

Lainnya:[
"Keperluan Lain"
]
},

Pemasukan:{
Pemasukan:[
"Gaji",
"Bonus",
"Penjualan Produk",
"Pendapatan Lainnya"
]
}

}

let transaksi=JSON.parse(localStorage.getItem("data"))||[]

let chart

function loadKategori(){

let tipe=document.getElementById("tipe").value
let kategoriSelect=document.getElementById("kategori")

kategoriSelect.innerHTML=""

Object.keys(kategori[tipe]).forEach(k=>{

let option=document.createElement("option")
option.value=k
option.textContent=k

kategoriSelect.appendChild(option)

})

loadSub()

}

function loadSub(){

let tipe=document.getElementById("tipe").value
let kat=document.getElementById("kategori").value
let sub=document.getElementById("sub")

sub.innerHTML=""

kategori[tipe][kat].forEach(s=>{

let option=document.createElement("option")
option.value=s
option.textContent=s

sub.appendChild(option)

})

}

document.getElementById("tipe").addEventListener("change",loadKategori)
document.getElementById("kategori").addEventListener("change",loadSub)

loadKategori()

function simpan(){

let t={
id:Date.now(),
tanggal:document.getElementById("tanggal").value,
tipe:document.getElementById("tipe").value,
kategori:document.getElementById("kategori").value,
sub:document.getElementById("sub").value,
jumlah:document.getElementById("jumlah").value,
catatan:document.getElementById("catatan").value
}

transaksi.push(t)

localStorage.setItem("data",JSON.stringify(transaksi))

render()

}

function render(){

let tbody=document.getElementById("data")

tbody.innerHTML=""

transaksi.forEach(t=>{

let warna=t.tipe=="Pemasukan"?"pemasukan":"amount"

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${t.tanggal}</td>
<td>${t.tipe}</td>
<td>${t.kategori}</td>
<td>${t.sub}</td>
<td class="${warna}">Rp ${Number(t.jumlah).toLocaleString()}</td>
<td>${t.catatan||"-"}</td>
<td><button onclick="hapus(${t.id})">X</button></td>
`

tbody.appendChild(tr)

})

updateTotal()
loadChart()

}

render()

function hapus(id){

transaksi=transaksi.filter(t=>t.id!=id)

localStorage.setItem("data",JSON.stringify(transaksi))

render()

}

function tambahSub(){

let kat=document.getElementById("kategoriBaru").value
let sub=document.getElementById("subBaru").value

if(sub=="")return

if(kat=="Pemasukan"){
kategori.Pemasukan.Pemasukan.push(sub)
}else{
kategori.Pengeluaran[kat].push(sub)
}

alert("Sub kategori ditambahkan")

loadSub()

}

function updateTotal(){

let pengeluaran=0
let pemasukan=0

transaksi.forEach(t=>{

if(t.tipe=="Pengeluaran"){
pengeluaran+=Number(t.jumlah)
}

if(t.tipe=="Pemasukan"){
pemasukan+=Number(t.jumlah)
}

})

document.getElementById("totalPengeluaran").innerText="Rp "+pengeluaran.toLocaleString()
document.getElementById("totalPemasukan").innerText="Rp "+pemasukan.toLocaleString()
document.getElementById("saldo").innerText="Rp "+(pemasukan-pengeluaran).toLocaleString()

}

function exportExcel(){

let csv="Tanggal,Tipe,Kategori,Sub,Jumlah,Catatan\n"

transaksi.forEach(t=>{
csv+=`${t.tanggal},${t.tipe},${t.kategori},${t.sub},${t.jumlah},${t.catatan}\n`
})

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="laporan_keuangan.csv"

a.click()

}

function backup(){

let blob=new Blob([JSON.stringify(transaksi)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup_keuangan.json"

a.click()

}

function loadChart(){

let dataKategori={}

transaksi.forEach(t=>{

if(t.tipe=="Pengeluaran"){

if(!dataKategori[t.kategori]){
dataKategori[t.kategori]=0
}

dataKategori[t.kategori]+=Number(t.jumlah)

}

})

let labels=Object.keys(dataKategori)
let values=Object.values(dataKategori)

let ctx=document.getElementById("chartPengeluaran")

if(chart){
chart.destroy()
}

chart=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Pengeluaran",
data:values,
backgroundColor:"#ff6384"
}]
},
options:{
plugins:{
legend:{display:false}
},
scales:{
y:{
beginAtZero:true
}
}
}
})

}

</script>

</body>
</html>
