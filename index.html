
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Keuangan Pribadi</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:10px;
}

.container{
max-width:650px;
margin:auto;
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{ text-align:center; }

.card{
background:#f5f5f5;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#4facfe;
color:white;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
font-size:14px;
}

th{ background:#eee; }

td.catatan{
max-width:180px;
word-wrap:break-word;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Aplikasi Keuangan</h1>

<div class="card">
<b>Total Pemasukan:</b> <span id="totalIncome">Rp 0</span><br>
<b>Total Pengeluaran:</b> <span id="totalExpense">Rp 0</span><br>
<b>Saldo:</b> <span id="saldo">Rp 0</span>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">

<label>Tipe Transaksi</label>
<select id="tipe">
<option value="Pengeluaran">Pengeluaran</option>
<option value="Pemasukan">Pemasukan</option>
</select>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Kategori</label>
<select id="kategori">
<option value="">Pilih Kategori</option>
</select>

<label>Sub Kategori</label>
<select id="subKategori">
<option value="">Pilih Sub</option>
</select>

<label>Jumlah</label>
<input type="number" id="jumlah">

<label>Catatan</label>
<input type="text" id="catatan">

<button onclick="tambah()">Simpan Transaksi</button>

</div>

<div class="card">
<h3>Tambah Kategori Baru</h3>

<input id="newKategori" placeholder="Nama kategori">
<button onclick="tambahKategori()">Tambah Kategori</button>

<input id="newSub" placeholder="Sub kategori">
<select id="kategoriSub"></select>
<button onclick="tambahSub()">Tambah Sub Kategori</button>
</div>

<div class="card">

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Tipe</th>
<th>Kategori</th>
<th>Sub</th>
<th>Jumlah</th>
<th>Catatan</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

</div>

<script>

let kategoriData = JSON.parse(localStorage.getItem("kategoriData")) || {

"Tagihan Bulanan":[
"BPJS",
"Listrik Bulanan",
"Token Listrik",
"Bayar Sampah",
"Iuran RT",
"Telkomsel Kartu Halo",
"Internet"
],

"Konsumsi":[
"Belanja Supermarket",
"GoFood",
"Makan di Luar",
"Belanja Mall",
"Belanja Tokopedia",
"Keperluan lain"
],

"Pemasukan":[
"Gaji",
"Bonus",
"Pendapatan Lain"
]

};

let transaksi = JSON.parse(localStorage.getItem("transaksi")) || [];

const kategoriSelect=document.getElementById("kategori");
const subSelect=document.getElementById("subKategori");
const kategoriSub=document.getElementById("kategoriSub");

function loadKategori(){

kategoriSelect.innerHTML='<option>Pilih Kategori</option>';
kategoriSub.innerHTML='';

Object.keys(kategoriData).forEach(k=>{

let o=document.createElement("option");
o.value=k;
o.textContent=k;

kategoriSelect.appendChild(o.cloneNode(true));
kategoriSub.appendChild(o.cloneNode(true));

});

}

loadKategori();

kategoriSelect.addEventListener("change",()=>{

subSelect.innerHTML='<option>Pilih Sub</option>';

kategoriData[kategoriSelect.value].forEach(s=>{

let o=document.createElement("option");
o.value=s;
o.textContent=s;

subSelect.appendChild(o);

});

});

function rupiah(n){
return "Rp "+Number(n).toLocaleString("id-ID");
}

function tambah(){

let t={
id:Date.now(),
tipe:document.getElementById("tipe").value,
tanggal:document.getElementById("tanggal").value,
kategori:kategoriSelect.value,
sub:subSelect.value,
jumlah:Number(document.getElementById("jumlah").value),
catatan:document.getElementById("catatan").value
}

if(!t.tanggal||!t.kategori||!t.sub||!t.jumlah){
alert("Lengkapi data");
return;
}

transaksi.push(t);
localStorage.setItem("transaksi",JSON.stringify(transaksi));

render();
}

function tambahKategori(){

let k=document.getElementById("newKategori").value;

if(!k) return;

kategoriData[k]=[];

localStorage.setItem("kategoriData",JSON.stringify(kategoriData));

loadKategori();

}

function tambahSub(){

let s=document.getElementById("newSub").value;
let k=document.getElementById("kategoriSub").value;

if(!s||!k) return;

kategoriData[k].push(s);

localStorage.setItem("kategoriData",JSON.stringify(kategoriData));

loadKategori();

}

function hapus(id){

transaksi=transaksi.filter(t=>t.id!=id);
localStorage.setItem("transaksi",JSON.stringify(transaksi));

render();

}

function render(){

let tbody=document.getElementById("data");
tbody.innerHTML="";

transaksi.forEach(t=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${t.tanggal}</td>
<td>${t.tipe}</td>
<td>${t.kategori}</td>
<td>${t.sub}</td>
<td>${rupiah(t.jumlah)}</td>
<td class="catatan">${t.catatan||"-"}</td>
<td><button onclick="hapus(${t.id})">X</button></td>
`;

tbody.appendChild(tr);

});

updateTotal();
updateChart();

}

function updateTotal(){

let income=0;
let expense=0;

transaksi.forEach(t=>{

if(t.tipe=="Pemasukan") income+=t.jumlah;
else expense+=t.jumlah;

});

document.getElementById("totalIncome").innerText=rupiah(income);
document.getElementById("totalExpense").innerText=rupiah(expense);
document.getElementById("saldo").innerText=rupiah(income-expense);

}

let chart;

function updateChart(){

let data={};

transaksi.forEach(t=>{
data[t.kategori]=(data[t.kategori]||0)+t.jumlah;
});

let labels=Object.keys(data);
let values=Object.values(data);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{

type:"pie",

data:{
labels:labels,
datasets:[{data:values}]
}

});

}

render();

</script>

</body>
</html>
