<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Keuangan</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:15px;
max-width:800px;
margin:auto;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#4a90e2;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

.amount{
color:#e53935;
font-weight:bold;
}

.pemasukan{
color:#1976d2;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Aplikasi Keuangan</h2>

<label>Tipe</label>
<select id="tipe">
<option>Pengeluaran</option>
<option>Pemasukan</option>
</select>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Kategori</label>
<select id="kategori"></select>

<label>Sub Kategori</label>
<select id="sub"></select>

<label>Jumlah</label>
<input type="number" id="jumlah">

<label>Catatan</label>
<input type="text" id="catatan">

<button onclick="simpan()">Simpan</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="backup()">Backup Data</button>

<hr>

<h3>Tambah Sub Kategori</h3>

<select id="kategoriBaru">
<option value="Pengeluaran">Pengeluaran</option>
<option value="Pemasukan">Pemasukan</option>
</select>

<input type="text" id="subBaru" placeholder="Nama sub kategori">

<button onclick="tambahSub()">Tambah Sub</button>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Tipe</th>
<th>Kategori</th>
<th>Sub</th>
<th>Jumlah</th>
<th>Catatan</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<script>

let kategori={
Pengeluaran:[
"Belanja Supermarket",
"Gojek / GoFood",
"Makan di Luar",
"Belanja di Mall",
"Bekel Anak",
"Bensin Kendaraan",
"Keperluan Lain"
],

Pemasukan:[
"Gaji",
"Bonus",
"Penjualan Produk",
"Pendapatan Lainnya"
]
}

let transaksi=JSON.parse(localStorage.getItem("data"))||[]

function loadKategori(){

let tipe=document.getElementById("tipe").value
let kat=document.getElementById("kategori")

kat.innerHTML=""

let option=document.createElement("option")
option.textContent=tipe
kat.appendChild(option)

loadSub()

}

function loadSub(){

let tipe=document.getElementById("tipe").value
let sub=document.getElementById("sub")

sub.innerHTML=""

kategori[tipe].forEach((s,i)=>{

let option=document.createElement("option")
option.value=s
option.textContent=s
sub.appendChild(option)

})

}

document.getElementById("tipe").addEventListener("change",loadKategori)

loadKategori()

function simpan(){

let t={
id:Date.now(),
tanggal:document.getElementById("tanggal").value,
tipe:document.getElementById("tipe").value,
kategori:document.getElementById("kategori").value,
sub:document.getElementById("sub").value,
jumlah:document.getElementById("jumlah").value,
catatan:document.getElementById("catatan").value
}

transaksi.push(t)

localStorage.setItem("data",JSON.stringify(transaksi))

render()

}

function render(){

let tbody=document.getElementById("data")

tbody.innerHTML=""

transaksi.forEach(t=>{

let warna=t.tipe=="Pemasukan"?"pemasukan":"amount"

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${t.tanggal}</td>
<td>${t.tipe}</td>
<td>${t.kategori}</td>
<td>${t.sub}</td>
<td class="${warna}">Rp ${Number(t.jumlah).toLocaleString()}</td>
<td>${t.catatan||"-"}</td>
<td>
<button onclick="hapus(${t.id})">X</button>
</td>
`

tbody.appendChild(tr)

})

}

render()

function hapus(id){

transaksi=transaksi.filter(t=>t.id!=id)

localStorage.setItem("data",JSON.stringify(transaksi))

render()

}

function tambahSub(){

let kat=document.getElementById("kategoriBaru").value
let sub=document.getElementById("subBaru").value

if(sub=="")return

kategori[kat].push(sub)

alert("Sub kategori ditambahkan")

loadSub()

}

function exportExcel(){

let csv="Tanggal,Tipe,Kategori,Sub,Jumlah,Catatan\n"

transaksi.forEach(t=>{

csv+=`${t.tanggal},${t.tipe},${t.kategori},${t.sub},${t.jumlah},${t.catatan}\n`

})

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="laporan_keuangan.csv"

a.click()

}

function backup(){

let blob=new Blob([JSON.stringify(transaksi)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup_keuangan.json"

a.click()

}

</script>

</body>
</html>
